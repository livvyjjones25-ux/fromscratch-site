<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="css/mystyles.css">
</head>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f4f4f4;
    }

    h1 {
        margin-top: 20px;
    }

    #board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-gap: 5px;
        justify-content: center;
        margin: 20px auto;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: white;
        border: 2px solid #333;
        font-size: 2em;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    .cell:hover {
        background: #ddd;
    }

    #status {
        font-size: 18px;
        margin: 10px;
    }

    #score {
        margin-top: 10px;
        font-size: 18px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 15px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>Tic-Tac-Toe</h1>

<div id="status">Your turn!</div>

<div id="board"></div>

<div id="score">
    You: <span id="playerScore">0</span> |
    Computer: <span id="computerScore">0</span>
</div>

<button onclick="resetGame()">Restart Match</button>
<br>

<script>
    const board = document.getElementById("board");
    const statusText = document.getElementById("status");
    const playerScoreEl = document.getElementById("playerScore");
    const computerScoreEl = document.getElementById("computerScore");

    let cells = [];
    let currentPlayer = "X";
    let gameActive = true;
    let playerScore = 0;
    let computerScore = 0;

    function createBoard() {
        board.innerHTML = "";
        cells = [];

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.dataset.index = i;
            cell.addEventListener("click", playerMove);
            board.appendChild(cell);
            cells.push(cell);
        }
    }

    function playerMove(e) {
        const cell = e.target;

        if (!gameActive || cell.textContent !== "") return;

        cell.textContent = "X";

        if (checkWinner("X")) {
            playerScore++;
            playerScoreEl.textContent = playerScore;
            endRound("You win this round!");
            return;
        }

        if (isDraw()) {
            endRound("It's a draw!");
            return;
        }

        statusText.textContent = "Computer thinking...";
        setTimeout(computerMove, 500);
    }

    function computerMove() {
    let emptyCells = cells.map((c, i) => c.textContent === "" ? i : null).filter(i => i !== null);

    // 1. Try to win
    for (let i of emptyCells) {
        cells[i].textContent = "O";
        if (checkWinner("O")) return finishComputerMove(true);
        cells[i].textContent = "";
    }

    // 2. Block player
    for (let i of emptyCells) {
        cells[i].textContent = "X";
        if (checkWinner("X")) {
            cells[i].textContent = "O";
            return finishComputerMove(false);
        }
        cells[i].textContent = "";
    }

    // 3. Otherwise random
    let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    cells[randomIndex].textContent = "O";
    finishComputerMove(false);
}

function finishComputerMove(won) {
    if (checkWinner("O")) {
        computerScore++;
        computerScoreEl.textContent = computerScore;
        endRound("Computer wins this round!");
        return;
    }

    if (isDraw()) {
        endRound("It's a draw!");
        return;
    }

    statusText.textContent = "Your turn!";
}

    function checkWinner(player) {
        const combos = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];

        return combos.some(combo => {
            return combo.every(i => cells[i].textContent === player);
        });
    }

    function isDraw() {
        return cells.every(cell => cell.textContent !== "");
    }

    function endRound(message) {
        gameActive = false;
        statusText.textContent = message;

        if (playerScore === 3) {
            setTimeout(() => {
                alert("🎉 You win the match!");
                resetGame();
            }, 500);
        } else if (computerScore === 3) {
            setTimeout(() => {
                alert("💻 Computer wins the match!");
                resetGame();
            }, 500);
        } else {
            setTimeout(newRound, 1000);
        }
    }

    function newRound() {
        createBoard();
        gameActive = true;
        statusText.textContent = "Your turn!";
    }

    function resetGame() {
        playerScore = 0;
        computerScore = 0;
        playerScoreEl.textContent = 0;
        computerScoreEl.textContent = 0;
        newRound();
    }

    // Initialize game
    createBoard();
</script>

</body>
</html>
